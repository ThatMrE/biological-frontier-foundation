<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biological Frontier Foundation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #020d08 0%, #0a2a18 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    .emoji {
      font-size: 5rem;
      display: block;
      margin-bottom: 1.5rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    h1 {
      font-size: 2.5rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: #00ff88;
      margin-bottom: 0.75rem;
    }
    .tagline {
      font-size: 1.2rem;
      opacity: 0.7;
      margin-bottom: 1.5rem;
      font-style: italic;
    }
    .body {
      font-size: 1rem;
      opacity: 0.55;
      line-height: 1.6;
    }
    .dot {
      width: 8px; height: 8px;
      background: #00ff88;
      border-radius: 50%;
      display: inline-block;
      margin: 2rem auto 0;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.6); }
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="emoji">🧬</span>
    <h1>Biological Frontier Foundation</h1>
    <p class="tagline">Funding the edges of life itself.</p>
    <p class="body">The next frontier isn't out there. It's alive.</p>
    <div class="dot"></div>
  </div>
</body>
</html>
